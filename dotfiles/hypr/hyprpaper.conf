# hyprpaper >= 0.8 dropped the old `preload = ...` / `wallpaper = mon,path`
# syntax in favour of a `wallpaper { }` category. The old keys were ignored
# without any error, which left the desktop with no wallpaper at all
# ("Monitor DSI-1 has no target: no wp will be created" in hyprpaper's log).
# monitor empty (or "*") = every monitor. fit_mode: cover | contain | tile.
wallpaper {
    monitor =
    path = ~/walls/cabin.png
    fit_mode = cover
}
